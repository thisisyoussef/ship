name: Railway Production Deploy
run-name: Railway Production Deploy / ${{ github.ref_name }} @ ${{ github.sha }}

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: railway-production-master
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Railway production
    runs-on: ubuntu-latest
    env:
      RAILWAY_PRODUCTION_PROJECT_ID: ${{ secrets.RAILWAY_PRODUCTION_PROJECT_ID }}
      RAILWAY_PRODUCTION_SERVICE: ${{ secrets.RAILWAY_PRODUCTION_SERVICE }}
      RAILWAY_PRODUCTION_WORKER_SERVICE: ${{ secrets.RAILWAY_PRODUCTION_WORKER_SERVICE }}
      RAILWAY_PRODUCTION_ENVIRONMENT: production
      RAILWAY_PRODUCTION_URL: ${{ secrets.RAILWAY_PRODUCTION_URL }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_TOKEN }}
      RAILWAY_PRODUCTION_DEMO_EMAIL: ${{ secrets.RAILWAY_PRODUCTION_DEMO_EMAIL }}
      RAILWAY_PRODUCTION_DEMO_PASSWORD: ${{ secrets.RAILWAY_PRODUCTION_DEMO_PASSWORD }}
      FLEETGRAPH_SERVICE_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_FLEETGRAPH_SERVICE_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Deploy Railway production commit
        run: ./scripts/deploy-railway-production.sh "$GITHUB_SHA"
