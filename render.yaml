services:
  - type: web
    name: audit-dashboard
    runtime: docker
    dockerfilePath: ./audit-app/Dockerfile.web
    dockerContext: .
    autoDeploy: false
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: audit-meta
          property: connectionString
      - key: AUDIT_APP_PASSWORD
        sync: false
      - key: AUDIT_SESSION_SECRET
        sync: false
      - key: AUDIT_CALLBACK_SECRET
        sync: false
      - key: AUDIT_PUBLIC_BASE_URL
        sync: false
      - key: GITHUB_ACTIONS_TOKEN
        sync: false
      - key: GITHUB_ACTIONS_REPO
        value: thisisyoussef/ship
      - key: GITHUB_ACTIONS_WORKFLOW_FILE
        value: audit-runner.yml
      - key: GITHUB_ACTIONS_WORKFLOW_REF
        value: codex/submission-clean

databases:
  - name: audit-meta
    databaseName: audit_meta
    plan: free
