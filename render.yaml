services:
  - type: web
    name: audit-dashboard
    runtime: docker
    dockerfilePath: ./audit-app/Dockerfile.web
    dockerContext: .
    autoDeploy: false
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: audit-meta
          property: connectionString
      - key: RUNNER_DATABASE_URL
        fromDatabase:
          name: audit-meta
          property: connectionString
      - key: AUDIT_APP_PASSWORD
        sync: false
      - key: AUDIT_SESSION_SECRET
        sync: false

  - type: worker
    name: audit-runner
    runtime: docker
    dockerfilePath: ./audit-app/Dockerfile.worker
    dockerContext: .
    autoDeploy: false
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: audit-meta
          property: connectionString
      - key: RUNNER_DATABASE_URL
        fromDatabase:
          name: audit-meta
          property: connectionString
      - key: AUDIT_APP_PASSWORD
        sync: false
      - key: AUDIT_SESSION_SECRET
        sync: false

databases:
  - name: audit-meta
    databaseName: audit_meta
    plan: starter
